<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artovky</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="hlavicka">
    <h1>artovky</h1>
  </header>

  <section class="ovladaci-panel">
    <div class="ovladaci-skupina">
      <label for="filtr-typ">Typ akce</label>
      <select id="filtr-typ">
        <option value="vse">Vše</option>
        <!-- další typy (kvízy, koncerty...) se doplní automaticky podle dat -->
      </select>
    </div>

    <div class="ovladaci-skupina">
      <label for="razeni">Řadit podle</label>
      <select id="razeni">
        <option value="estetickeSkore">Estet. skóre</option>
        <option value="vazenePrumer">Vážené skóre</option>
        <option value="datum">Datum nejblíž</option>
      </select>
    </div>

    <div class="ovladaci-datum">
      <div class="ovladaci-skupina">
        <label for="filtr-od">Od data</label>
        <input type="date" id="filtr-od">
      </div>

      <div class="ovladaci-skupina">
        <label for="filtr-do">Do data</label>
        <input type="date" id="filtr-do">
      </div>
    </div>

    <div class="ovladaci-skupina">
      <label>Rychlá volba</label>
      <div class="rychle-volby">
        <button type="button" data-rozsah="dnes">Dnes</button>
        <button type="button" data-rozsah="tyden">Tento týden</button>
        <button type="button" data-rozsah="mesic">Tento měsíc</button>
        <button type="button" data-rozsah="vse">Vše</button>
        <!-- přepínač: aktivní (žlutý) = zobrazí jen akce označené srdíčkem -->
        <button type="button" id="filtr-oblibene" class="srdce srdce-filtr" aria-label="Zobrazit jen oblíbené" aria-pressed="false"></button>
        <!-- přepínač: aktivní (žlutý) = zobrazí jen akce s estetickým skóre 80 a výš -->
        <button type="button" id="filtr-top" class="hvezda hvezda-filtr" aria-label="Zobrazit jen skóre 80 a výš" aria-pressed="false"></button>
      </div>
    </div>
  </section>

  <main id="seznam-akci" class="seznam-akci">
    <!-- karty se generují v js/app.js -->
  </main>

  <p id="prazdny-stav" class="prazdny-stav" hidden>Žádné akce neodpovídají filtru. Zkus to rozšířit, ne zúžit — jako v životě.</p>

  <footer class="paticka">
    <p>Data generuje Cowork, appka je jen tupý renderer.</p>
  </footer>

<script src="js/app.js?v=6"></script>
</body>
</html>
